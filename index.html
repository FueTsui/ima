<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>正在跳转</title>
  <style>
    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #f6f7f9;
      color: #333;
    }

    .card {
      padding: 28px 32px;
      border-radius: 16px;
      background: white;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>正在为你分配专属链接</h3>
    <p>页面即将自动跳转……</p>
  </div>

  <script>
    const links = [
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/72e85b14-d2a4-4e92-8823-a1a9aba93c5f",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/5751eeb2-cdc3-4506-90bb-1cd4e9f00d35",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/5541f162-f10a-4476-9ca9-bbcb83e6da0a",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/f9fa4df5-1655-412f-bd3c-f4ea8341dd35",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/2d1eeff1-0900-49a7-866c-508e17ba63ff",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/abc1777b-2bc8-47a9-8f0f-977bada2ed69"
    ];

    const storageKey = "ima_assigned_link";
    let index = localStorage.getItem(storageKey);

    if (index === null) {
      index = Math.floor(Math.random() * links.length);
      localStorage.setItem(storageKey, String(index));
    }

    setTimeout(() => {
      window.location.replace(links[Number(index)]);
    }, 800);
  </script>
</body>
</html>
