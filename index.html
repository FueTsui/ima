<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>正在跳转</title>
  <style>
    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #f6f7f9;
      color: #333;
    }

    .card {
      padding: 28px 32px;
      border-radius: 16px;
      background: white;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>正在为你分配专属链接</h3>
    <p>页面即将自动跳转……</p>
  </div>

  <script>
    const links = [
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/f6853b67-9446-4bbf-841d-097dc906cfde",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/57dfeb75-7c32-4049-8ea2-59811a88d67e",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/62c03392-2ae0-4757-8b9c-3e33e060b83b",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/529b2749-d5e5-4957-a06a-d198db269c53",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/dba3760f-6200-480c-b094-9ebad4b3af84",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/4dc9ee4d-e73a-4f8e-bb8c-18f45acbe9da",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/55cbea7d-6774-46ff-927a-8396de7d8377",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/83e8ea1a-17a6-4aac-ac8c-9cd6658abebf",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/857fbc57-5739-4afc-83ba-7b682287faac",
      "https://ima.qq.com/copilot-token-incentive/token-ticket-claim/27480086-1cd5-4b47-8409-b17552097e44"
    ];

    const storageKey = "ima_assigned_link";
    let index = localStorage.getItem(storageKey);

    if (index === null) {
      index = Math.floor(Math.random() * links.length);
      localStorage.setItem(storageKey, String(index));
    }

    setTimeout(() => {
      window.location.replace(links[Number(index)]);
    }, 800);
  </script>
</body>
</html>
